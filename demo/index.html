<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Companion for Workday — Demo</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #eef1f5; color: #1a202c; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .demo-shell { max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }
      .demo-header h1 { margin: 0 0 4px; font-size: 24px; }
      .demo-muted { color: #64748b; font-size: 13px; }
      code { background: #e2e8f0; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
      .demo-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-top: 18px; }
      .demo-card h2 { margin: 0 0 6px; font-size: 18px; }
      .demo-card h3 { font-size: 15px; margin: 18px 0 8px; }
      .demo-toggle { display: inline-flex; gap: 8px; align-items: center; margin: 8px 0; font-size: 14px; }
      .demo-conflict-note { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 8px; padding: 8px 12px; margin: 8px 0; font-size: 13px; }
      .demo-results { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
      .demo-result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #eef0f3; }
      .demo-result-row:last-child { border-bottom: none; }
      .demo-legend { display: flex; gap: 8px; margin: 6px 0 14px; }
      .demo-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 820px) { .demo-two-col { grid-template-columns: 1fr; } }
      .demo-degree { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
      .demo-degree h3 { margin: 0 0 2px; }
      .demo-tag { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; background: #ede9fe; color: #5b21b6; margin: 1px 3px 1px 0; }
      .demo-group { border-top: 1px solid #eef0f3; padding: 8px 0; }
      .demo-group-title { display: flex; justify-content: space-between; font-weight: 600; font-size: 13px; }
      .demo-bar { height: 7px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 5px 0; }
      .demo-bar > div { height: 100%; background: #16a34a; }
      .demo-chip { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; margin: 2px 4px 2px 0; border: 1px solid transparent; }
      .demo-chip.completed { background: #dcfce7; color: #166534; }
      .demo-chip.in-progress { background: #fef9c3; color: #854d0e; }
      .demo-chip.planned { background: #dbeafe; color: #1e40af; }
      .demo-chip.none { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
      .demo-table { width: 100%; border-collapse: collapse; }
      .demo-table th, .demo-table td { text-align: left; padding: 7px 10px; border-bottom: 1px solid #eef0f3; font-size: 13px; }
      .demo-table th { color: #475569; font-size: 12px; }
      .demo-board { display: flex; gap: 12px; overflow-x: auto; }
      .demo-term { min-width: 200px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; }
      .demo-term h4 { margin: 0 0 2px; font-size: 14px; }
      .demo-course { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 9px; margin: 6px 0; font-size: 12.5px; }
      .demo-course.multi { border-left: 3px solid #7c3aed; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
